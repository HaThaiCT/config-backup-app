# =============================================================================
# NGINX BACKUP CONFIGURATION
# =============================================================================
# File: nginx.yaml
# Backs up nginx configuration files

name: nginx

backup:
  source_files:
    - /etc/nginx/nginx.conf
    - /etc/nginx/sites-available/
    - /etc/nginx/sites-enabled/
    - /etc/nginx/conf.d/
  destination: /backups

schedule:
  backup_interval: "01:00:00:00"    # 1 ngày
  cleanup_interval: "01:00:00:00"   # 1 ngày

cleanup:
  ttl: "30:00:00:00"                # 30 ngày
  min_keep: 5

logging:
  level: INFO
