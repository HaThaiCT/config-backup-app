# =============================================================================
# SSH BACKUP CONFIGURATION
# =============================================================================
# File: ssh.yaml
# Backs up SSH configuration and authorized keys

name: ssh

backup:
  source_files:
    - /etc/ssh/sshd_config
    - /etc/ssh/ssh_config
    - /root/.ssh/authorized_keys
  destination: /backups

schedule:
  backup_interval: "07:00:00:00"    # 7 ngày (SSH config ít thay đổi)
  cleanup_interval: "01:00:00:00"   # 1 ngày

cleanup:
  ttl: "90:00:00:00"                # 90 ngày
  min_keep: 3

logging:
  level: INFO
